name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e '.[dev]'

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy --strict)
        run: mypy

      - name: Fetch Chinook database (SHA-256 verified)
        run: python scripts/fetch_chinook.py

      - name: Validate question bank against Chinook
        run: python -m gavel validate-bank

      - name: Test
        run: pytest

      - name: End-to-end example run
        run: >
          python -m gavel run --agent static
          --predictions examples/baseline_predictions.jsonl
          --report /tmp/report.md
